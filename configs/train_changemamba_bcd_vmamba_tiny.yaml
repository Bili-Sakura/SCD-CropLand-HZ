# ChangeMamba BCD — VMamba-Tiny (architecture: vssm_tiny_224_0229flex)
# Paths are relative to the repository root unless absolute.
# CLI flags override values from this file when both are used.

cfg: src/ChangeMamba/changedetection/configs/vssm1/vssm_tiny_224_0229flex.yaml
pretrained_weight_path: models/MzeroMiko/VMamba/vssm_tiny_0229_ckpt_epoch_292.pth
resume: null

dataset: SYSU
train_dataset_path: datasets/SYSU/train
train_data_list_path: datasets/SYSU/train.txt
test_dataset_path: datasets/SYSU/test
test_data_list_path: datasets/SYSU/test.txt

type: train
shuffle: true
batch_size: 16
num_workers: 4
crop_size: 256
max_iters: 320000

model_type: MambaBCD_Tiny
model_param_path: models/BiliSakura
model_save_path: models/BiliSakura/ChangeMambaBCD/Tiny

cuda: true
start_iter: 0
learning_rate: 0.0001
weight_decay: 0.0005

# Optional yacs overrides (pairs for --opts), e.g. gradient checkpointing:
# opts:
#   - TRAIN.USE_CHECKPOINT
#   - true
